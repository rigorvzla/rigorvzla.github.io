<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <base href="/" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #adbac7;
        }

        .loader {
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d333b;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            font-size: 1rem;
        }

        a {
            color: #4a9eff;
            text-decoration: none;
        }
    </style>
    <script>
        // Capturar la ruta que causó el 404
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        var fullPath = path + search + hash;

        // Guardar la ruta
        sessionStorage.setItem('blazorDeepLink', fullPath);

        // Redirigir a la raíz
        window.location.replace('/');
    </script>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirigiendo...</p>
        <p><small>Si no eres redirigido automáticamente, <a href="/">haz clic aquí</a></small></p>
    </div>
</body>
</html>
